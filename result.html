<div class="risk-container">
    <h3>Risk Score: {{ score }}/6</h3>

    <div class="progress">
        <div
            class="progress-bar"
            role="progressbar"
            style="width: {{ (score/6)*100 }}%;"
        >
            {{ score }}/6
        </div>
    </div>

    <p>Detection Threshold: 2 points</p>
</div>
